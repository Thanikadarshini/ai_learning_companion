<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Learning Companion</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#f4f7ff;
}

/* LOGIN PAGE */
.login-container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4f46e5,#7c3aed);
}

.login-box{
background:white;
padding:30px;
border-radius:15px;
width:300px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.login-box h2{
text-align:center;
margin-bottom:20px;
}

input, select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#4f46e5;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#3730a3;
}

/* APP */
header{
background:#4f46e5;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.sidebar{
width:200px;
background:#0d0781;
padding:15px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
padding:10px;
border:none;
border-radius:8px;
background:#4f46e5;
cursor:pointer;
}

.main{
flex:1;
padding:20px;
}

.card{
background:#a1a1e9;
padding:15px;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.chat-box{
background:#f8fafc;
height:350px;
overflow-y:auto;
padding:15px;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.msg{
padding:12px;
margin:10px 0;
border-radius:12px;
max-width:80%;
line-height:1.6;
white-space:pre-wrap;
word-wrap:break-word;
font-size:15px;
}

.user{background:#4f46e5;color:white;margin-left:auto;}

.ai{
background:#ffffff;
border-left:4px solid #4f46e5;
padding:15px;
color:#333;
}



</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-container">
<div class="login-box">
<h2>AI Tutor Login</h2>

<input id="username" placeholder="Enter Username">

<select id="role">
<option value="student">Student</option>
<option value="teacher">Teacher</option>
</select>

<button onclick="login()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<header>
<div>AI Learning Companion</div>
<div id="userInfo"
onclick="showProfile()"
style="cursor:pointer;">
</div>
</header>

<div class="container">

<div class="sidebar">
<button onclick="showHome()">Dashboard</button>
<button onclick="showChat()">AI Tutor</button>
<button onclick="showResources()">
Resources
</button>

<!-- ADD THIS NEW BUTTON -->
<button onclick="showProgress()">
Progress
</button>

<button onclick="showProfile()">
Profile
</button>

<button onclick="logout()">
Logout
</button>
</div>

<div class="main" id="main"></div>

</div>
</div>

<script>

let currentUser = null;

/* LOGIN */
function login(){
let name = document.getElementById("username").value;
let role = document.getElementById("role").value;

if(name === ""){
alert("Enter username");
return;
}

currentUser = {name, role};
sessionStorage.setItem("user", JSON.stringify(currentUser));

showApp();
}

/* LOAD SESSION */
window.onload = function(){
let saved = sessionStorage.getItem("user");
if(saved){
currentUser = JSON.parse(saved);
showApp();
}
}

/* SHOW APP */
function showApp(){
document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("userInfo").innerText =
currentUser.name + " (" + currentUser.role + ")";

showHome();
}

/* LOGOUT */
function logout(){
sessionStorage.removeItem("user");
location.reload();
}

/* HOME */
function showHome(){

let weakTopic =
localStorage.getItem("weakTopic") ||
"No Weakness Detected";

let recommendation =
weakTopic === "No Weakness Detected"
? "Excellent! Keep learning."
: `Practice more in ${weakTopic}.`

let score =
localStorage.getItem(
currentUser.name + "_Score"
) || 0;

document.getElementById("main").innerHTML = `

<h2>Welcome ${currentUser.name} 👋</h2>

<div style="display:flex; gap:15px; flex-wrap:wrap;">

<div class="card" style="flex:1;">
<h3>Role</h3>
<p>${currentUser.role}</p>
</div>

<div class="card" style="flex:1;">
<h3> Score</h3>
<p>${score}%</p>
</div>

</div>

<br>

<div class="card">
<h3>AI Learning Companion</h3>
<p>
Ask questions, take quizzes and track your learning progress.
</p>
</div>

`;
}

/* CHAT */
function showChat(){
document.getElementById("main").innerHTML=`
<h2>AI Tutor Chat</h2>

<div class="chat-box" id="chat">
<div class="msg ai">Hello ${currentUser.name}, ask me anything!</div>
</div>

<input id="msgInput" placeholder="Type question...">
<button onclick="send()">Send</button>
`;

document
.getElementById("msgInput")
.addEventListener("keypress",
function(e){

if(e.key==="Enter"){
send();
}

});
}

/* CHAT FUNCTION */
async function send() {

let input = document.getElementById("msgInput");
let chat = document.getElementById("chat");

if(input.value.trim() === "") return;

let userText = input.value;

/* Show user message */
chat.innerHTML += `
<div class="msg user">${userText}</div>
`;

input.value = "";

/* Loading message */
chat.innerHTML += `
<div class="msg ai" id="loading">
Thinking...
</div>
`;

chat.scrollTop = chat.scrollHeight;

try {

const response = await fetch(
"/chat",
{
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
message: userText
})
}
);

if (!response.ok) {
  const text = await response.text();
  throw new Error(text);
}

const data = await response.json(); 

document.getElementById("loading").remove();

console.log(data); // DEBUG

/* Show AI reply */
chat.innerHTML += `
<div class="msg ai">
<strong>🤖 AI Tutor</strong><br><br>
${data.reply.replace(/\n/g,"<br>")}
</div>
`;

let progress =
parseInt(
localStorage.getItem(
currentUser.name + "_progress"
)
) || 0;

progress += 5;

if(progress > 100)
progress = 100;

localStorage.setItem(
currentUser.name + "_progress",
progress
);

chat.scrollTop = chat.scrollHeight;

} catch(error){

console.error(error);

document.getElementById("loading").remove();

chat.innerHTML += `
<div class="msg ai">
Server error.
</div>
`;

}
}

/*  */
function show(){

document.getElementById("main").innerHTML = `

<h2>Quick </h2>

<div class="card">

<p>1. What does DBMS stand for?</p>

<button onclick="checkAnswer(true,'DBMS')">
Database Management System
</button>

<button onclick="checkAnswer(false,'DBMS')">
Data Backup Management Service
</button>

</div>

<br>

<div class="card">

<p>2. What is the main function of an Operating System?</p>

<button onclick="checkAnswer(true,'Operating System')">
Manage Computer Resources
</button>

<button onclick="checkAnswer(false,'Operating System')">
Create Websites
</button>

</div>

`;
}

function showProgress(){

let progress =
parseInt(
localStorage.getItem(
currentUser.name + "_progress"
)
) || 0;

document.getElementById("main").innerHTML = `

<h2>Learning Progress</h2>

<div class="card">
<h3>Learning Progress</h3>

<progress
value="${progress}"
max="100"
style="width:100%;height:25px;">
</progress>

<p>
Questions Asked: ${progress/5}
<br>
Progress: ${progress}% Completed
</p>

</div>

`;

}

function saveScore(score){

localStorage.setItem(
"Score",
score
);

alert(
score === 100
? "Correct!"
: "Wrong!"
);

showProgress();
}

function checkAnswer(correct, topic){

if(correct){

alert("Correct!");

let score =
parseInt(
localStorage.getItem(
currentUser.name + "_Score"
)
) || 0;

score += 20;

if(score > 100) score = 100;

localStorage.setItem(
currentUser.name + "_Score",
score
);

// REMOVE WEAK TOPIC
localStorage.removeItem("weakTopic");

showHome();

}
else {

alert("Wrong!");

localStorage.setItem(
"weakTopic",
topic
);

showHome();
}
}

function showResources(){

document.getElementById("main").innerHTML = `

<h2>Recommended Learning Platforms</h2>

<div class="card">
<h3>📚 GeeksforGeeks</h3>
<p>Learn programming, DBMS, OS, AI, ML and more.</p>
<a href="https://www.geeksforgeeks.org" target="_blank">
Visit Platform
</a>
</div>

<div class="card">
<h3>💻 W3Schools</h3>
<p>Learn web development and programming.</p>
<a href="https://www.w3schools.com" target="_blank">
Visit Platform
</a>
</div>

<div class="card">
<h3>🎓 Coursera</h3>
<p>Professional courses from top universities.</p>
<a href="https://www.coursera.org" target="_blank">
Visit Platform
</a>
</div>

<div class="card">
<h3>📖 TutorialsPoint</h3>
<p>Quick tutorials on almost every subject.</p>
<a href="https://www.tutorialspoint.com" target="_blank">
Visit Platform
</a>
</div>

`;
}

function showProfile(){

let email =
localStorage.getItem(
currentUser.name + "_email"
) || "";

let mobile =
localStorage.getItem(
currentUser.name + "_mobile"
) || "";

document.getElementById("main").innerHTML = `

<h2>My Profile</h2>

<div class="card">

<p><b>Name:</b> ${currentUser.name}</p>
<p><b>Role:</b> ${currentUser.role}</p>

<input
id="email"
placeholder="Enter Email"
value="${email}"
>

<input
id="mobile"
placeholder="Enter Mobile Number"
value="${mobile}"
>

<button onclick="saveProfile()">
Save Profile
</button>

</div>

`;
}

function saveProfile(){

let email =
document.getElementById("email").value;

let mobile =
document.getElementById("mobile").value;

localStorage.setItem(
currentUser.name + "_email",
email
);

localStorage.setItem(
currentUser.name + "_mobile",
mobile
);

alert("Profile Saved!");

}

</script>


<footer style="
text-align:center;
padding:10px;
background:#4f46e5;
color:white;
position:fixed;
bottom:0;
width:100%;
">
AI Learning Companion © 2026
</footer>


</body>
</html>
